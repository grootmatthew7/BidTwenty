<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidTwenty — Palette Mockups</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0b0d10;
    color: #e8edf3;
    padding: 24px;
  }
  h1.page { text-align: center; font-size: 1.6rem; margin: 0 0 4px; }
  p.page-sub { text-align: center; color: #8a97a8; margin: 0 0 24px; font-size: .9rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
    max-width: 1180px;
    margin: 0 auto;
  }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  /* ---- Themed mock (all colors come from CSS vars set per palette) ---- */
  .mock {
    --radius: 14px;
    background: radial-gradient(900px 400px at 50% -20%, var(--panel-2), var(--bg));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    color: var(--text);
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  .mock .pal-name { font-size: 1.15rem; font-weight: 800; margin: 0 0 2px; }
  .mock .pal-desc { color: var(--muted); font-size: .8rem; margin: 0 0 14px; }

  .swatches { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .sw { width: 30px; height: 30px; border-radius: 7px; border: 1px solid rgba(255,255,255,.12); }

  .mock .brand { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; text-align: center; margin-bottom: 2px; }
  .mock .brand span { color: var(--accent); }
  .mock .cat-banner {
    text-align: center; color: var(--accent); font-weight: 800;
    text-transform: uppercase; letter-spacing: .5px; font-size: .8rem; margin-bottom: 12px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
  }

  /* player up for bid */
  .player-card {
    background: linear-gradient(160deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px; text-align: center;
  }
  .pc-name { font-size: 1.4rem; font-weight: 800; }
  .pc-team { color: var(--muted); margin: 2px 0 10px; font-size: .85rem; }
  .pc-cat {
    display: inline-block; background: color-mix(in srgb, var(--accent-2) 18%, transparent);
    color: var(--accent-2); border-radius: 999px; padding: 4px 12px; font-size: .8rem; font-weight: 700;
  }
  .pc-value { margin-top: 10px; font-size: .8rem; color: var(--muted); }
  .pc-value b { color: var(--text); }

  .bid-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-top: 12px; }
  input.bid {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; font-size: .95rem; width: 100%;
  }
  button.btn {
    border: none; border-radius: 10px; padding: 10px 16px; font-weight: 800; cursor: pointer;
    background: var(--accent); color: var(--btn-ink, #10151c);
  }
  button.ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }

  /* scoreboard */
  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: stretch; }
  .team { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; }
  .team.me { border-color: color-mix(in srgb, var(--me) 55%, transparent); }
  .team.them { border-color: color-mix(in srgb, var(--them) 55%, transparent); }
  .team-head { display: flex; justify-content: space-between; align-items: baseline; }
  .team-name { font-weight: 800; }
  .team.me .team-name { color: var(--me); }
  .team.them .team-name { color: var(--them); }
  .budget { font-weight: 800; }
  .roster { list-style: none; padding: 0; margin: 8px 0 0; font-size: .78rem; }
  .roster li { display: flex; justify-content: space-between; padding: 3px 0; border-top: 1px dashed var(--line); }
  .roster .cat { color: var(--muted); }
  .vs { align-self: center; color: var(--muted); font-weight: 800; }

  /* scoreline */
  .scoreline { text-align: center; margin-top: 12px; color: var(--muted); font-size: 1rem; }
  .scoreline b { color: var(--text); font-size: 1.25rem; }
  .scoreline .sl-label { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: .72rem; margin-right: 6px; }
  .scoreline .sl-dash { margin: 0 8px; }
  .gold-pill {
    display:inline-block; background: var(--gold); color:#10151c; font-weight:800;
    border-radius:999px; padding:2px 8px; font-size:.7rem; margin-left:6px;
  }

  /* ============ PALETTE DEFINITIONS ============ */
  .pal-hardwood {
    --bg:#f3e7cf; --panel:#fffaf0; --panel-2:#efe0c6; --line:#d8c199;
    --text:#2a1f14; --muted:#8a7454; --accent:#d9541a; --accent-2:#1d4e89;
    --me:#1a7a3c; --them:#b4232a; --gold:#c8912b; --btn-ink:#fff6e9;
  }
  .pal-arena {
    --bg:#08080d; --panel:#14131d; --panel-2:#1e1c2b; --line:#322f45;
    --text:#f5f3ff; --muted:#9a95b5; --accent:#ff6a00; --accent-2:#22d3ee;
    --me:#a3e635; --them:#fb7185; --gold:#ffcf33; --btn-ink:#0b0b12;
  }
  .pal-blacktop {
    --bg:#17181a; --panel:#212327; --panel-2:#2b2e33; --line:#3a3d42;
    --text:#ececec; --muted:#8b8f96; --accent:#d4ff2e; --accent-2:#ff3d81;
    --me:#4ade80; --them:#ff5252; --gold:#ffd23f; --btn-ink:#14150f;
  }
  .pal-aba {
    --bg:#f2ede2; --panel:#fbf7ee; --panel-2:#e7ddc8; --line:#cdbfa0;
    --text:#1b2436; --muted:#6b7280; --accent:#c8202f; --accent-2:#12386b;
    --me:#12386b; --them:#c8202f; --gold:#d99a2b; --btn-ink:#fff6ee;
  }
</style>
</head>
<body>
  <h1 class="page">BidTwenty — Colorway Mockups</h1>
  <p class="page-sub">Same UI, four basketball-flavored palettes. Pick one and I'll wire it into the real app.</p>

  <div class="grid" id="grid"></div>

<script>
  const palettes = [
    { cls:"pal-hardwood", name:"A · Hardwood Classic", desc:"Maple court, walnut lines, leather-orange. Light & premium.",
      swatches:["#f3e7cf","#fffaf0","#d9541a","#1d4e89","#1a7a3c","#b4232a","#c8912b"] },
    { cls:"pal-arena", name:"B · Night Arena", desc:"Near-black with jumbotron neon. Primetime broadcast.",
      swatches:["#08080d","#14131d","#ff6a00","#22d3ee","#a3e635","#fb7185","#ffcf33"] },
    { cls:"pal-blacktop", name:"C · Blacktop / Streetball", desc:"Concrete gray + spray-paint volt & magenta. Gritty.",
      swatches:["#17181a","#212327","#d4ff2e","#ff3d81","#4ade80","#ff5252","#ffd23f"] },
    { cls:"pal-aba", name:"D · ABA Retro", desc:"Cream, navy & patriot red. 1976 tricolor throwback.",
      swatches:["#f2ede2","#fbf7ee","#c8202f","#12386b","#12386b","#c8202f","#d99a2b"] },
  ];

  function mock(p) {
    const sw = p.swatches.map(c => `<div class="sw" style="background:${c}"></div>`).join("");
    return `
    <div class="mock ${p.cls}">
      <div class="pal-name">${p.name}</div>
      <div class="pal-desc">${p.desc}</div>
      <div class="swatches">${sw}</div>

      <div class="brand">Bid<span>Twenty</span></div>
      <div class="cat-banner">Most Valuable Player auction</div>

      <div class="player-card">
        <div class="pc-name">Nikola Jokić</div>
        <div class="pc-team">Denver Nuggets</div>
        <span class="pc-cat">Most Valuable Player</span>
        <div class="pc-value">Value <b>96.4</b> · high bid <b>$7</b></div>
        <div class="bid-row">
          <input class="bid" value="$8" />
          <button class="btn">Bid</button>
          <button class="btn ghost">Pass</button>
        </div>
      </div>

      <div class="scoreboard">
        <div class="team me">
          <div class="team-head"><span class="team-name">Alice</span><span class="budget">$6</span></div>
          <ul class="roster">
            <li><span>SGA</span><span class="cat">OKC · 98</span></li>
            <li><span>Curry</span><span class="cat">GSW · 89</span></li>
          </ul>
        </div>
        <div class="vs">VS</div>
        <div class="team them">
          <div class="team-head"><span class="team-name">Bob <span class="gold-pill">FULL</span></span><span class="budget">$2</span></div>
          <ul class="roster">
            <li><span>Embiid</span><span class="cat">PHI · 94</span></li>
            <li><span>Dončić</span><span class="cat">LAL · 91</span></li>
          </ul>
        </div>
      </div>

      <div class="scoreline">
        <span class="sl-label">Final · OT2</span>
        Alice <b>139</b><span class="sl-dash">–</span><b>138</b> Bob
      </div>
    </div>`;
  }

  document.getElementById("grid").innerHTML = palettes.map(mock).join("");
</script>
</body>
</html>
